<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scienceroom</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    background: radial-gradient(circle at top, #a855f7, #4c00ff, #000000);
    background-attachment: fixed;
}

/* Glow */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(168,85,247,0.25), transparent 60%);
    animation: glowMove 10s linear infinite;
    z-index: -1;
}

@keyframes glowMove {
    0% { transform: translate(-25%, -25%); }
    50% { transform: translate(-10%, -10%); }
    100% { transform: translate(-25%, -25%); }
}

h1 {
    text-align: center;
    margin-top: 30px;
    font-size: 3em;
}

/* Section */
.section {
    width: 80%;
    margin: 40px auto;
    padding: 30px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 25px rgba(168,85,247,0.5);
}

/* Buttons */
.btn {
    padding: 15px 40px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #7a00ff, #a855f7);
    color: white;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #a855f7;
}

/* Pages */
.page {
    display: none;
}

/* Game */
iframe {
    width: 100%;
    height: 75vh;
    border: none;
}
</style>
</head>

<body>

<h1>Scienceroom</h1>

<!-- HOME PAGE -->
<div id="homePage" class="page" style="display:block;">
    <div class="section">
        <h2>Grow a Garden</h2>
        <p>Click to play</p>
        <button class="btn" onclick="openGame()">Play</button>
    </div>
</div>

<!-- GAME PAGE -->
<div id="gamePage" class="page">
    <div class="section">
        <h2>Grow a Garden</h2>

        <button class="btn" onclick="goHome()">Back</button>
        <button class="btn" onclick="downloadGame()">Download Game</button>

        <iframe src="growagarden/index.html"></iframe>
    </div>
</div>

<script>
function openGame() {
    document.getElementById("homePage").style.display = "none";
    document.getElementById("gamePage").style.display = "block";
}

function goHome() {
    document.getElementById("gamePage").style.display = "none";
    document.getElementById("homePage").style.display = "block";
}

function downloadGame() {
    const link = document.createElement("a");
    link.href = "growagarden/index.html"; // your game file
    link.download = "growagarden.html";
    link.click();
}
</script>

</body>
</html>
